name: Website CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -eo pipefail
          test -f website/index.html
          test -f website/styles.css
          test -f website/script.js
          test -f assets/logo.svg
          test -f assets/profile.svg
          test -f assets/favicon.svg

      - name: Validate asset references in HTML
        run: |
          set -eo pipefail
          refs=$(grep -Eo '(src|href)="\.\./assets/[^"]+"' website/index.html | sed -E 's/^(src|href)="(.*)"$/\2/' || true)

          if [ -z "$refs" ]; then
            echo "No ../assets references found in website/index.html"
            exit 1
          fi

          for ref in $refs; do
            file_path="website/${ref}"
            if [ ! -f "$file_path" ]; then
              echo "Missing referenced file: $file_path"
              exit 1
            fi
          done

          echo "All HTML asset references are valid."
